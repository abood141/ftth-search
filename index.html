<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#07090F">
    <title>FTTH — بحث المشتركين</title>
    <meta name="description" content="أداة البحث عن مشتركي FTTH للفنيين">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #07090F;
            --bg2: #0D1220;
            --bg3: #121A2E;
            --bg4: #1A2440;
            --blue: #4F8EF7;
            --blue-d: #2563EB;
            --green: #10D9A0;
            --green-d: #059669;
            --red: #F75D5D;
            --amber: #F5A623;
            --purple: #A78BFA;
            --cyan: #22D3EE;
            --text: #E8EFF8;
            --muted: #5A6A85;
            --border: #1E2D45;
            --radius: 14px;
            --radius-sm: 10px;
            --max-w: 520px;
        }

        html {
            text-rendering: optimizeSpeed;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Tajawal', Tahoma, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* ── Animated BG ── */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-orbs .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.07;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--blue);
            top: -180px;
            right: -150px;
            animation: orb-float 22s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--green);
            bottom: -120px;
            left: -120px;
            animation: orb-float 28s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: var(--purple);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orb-float 18s ease-in-out infinite 3s;
        }

        @keyframes orb-float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(40px, -30px) scale(1.08);
            }

            66% {
                transform: translate(-30px, 25px) scale(0.94);
            }
        }

        /* ── App Shell ── */
        .app {
            position: relative;
            z-index: 1;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 16px 14px env(safe-area-inset-bottom, 24px);
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 28px 0 20px;
        }

        .header-logo {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue-d), var(--blue));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
            box-shadow: 0 0 28px rgba(79, 142, 247, 0.3);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(79, 142, 247, 0.25);
            }

            50% {
                box-shadow: 0 0 40px rgba(79, 142, 247, 0.4);
            }
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.3;
        }

        .header p {
            color: var(--muted);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        /* ── Cards ── */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 18px;
            margin-bottom: 14px;
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: rgba(79, 142, 247, 0.2);
        }

        .card-glow-blue {
            border-color: rgba(79, 142, 247, 0.25);
            box-shadow: 0 0 20px rgba(79, 142, 247, 0.06);
        }

        .card-glow-green {
            border-color: rgba(16, 217, 160, 0.25);
            box-shadow: 0 0 20px rgba(16, 217, 160, 0.06);
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .card-title .icon {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        .icon-blue {
            background: rgba(79, 142, 247, 0.15);
        }

        .icon-green {
            background: rgba(16, 217, 160, 0.12);
        }

        .icon-amber {
            background: rgba(245, 166, 35, 0.12);
        }

        /* ── Inputs ── */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .ico {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.95rem;
            pointer-events: none;
            color: var(--muted);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 40px 12px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.12);
        }

        input::placeholder {
            color: var(--muted);
        }

        .pw-toggle {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
        }

        /* ── Buttons ── */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            width: 100%;
            padding: 13px 22px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .btn-blue {
            background: linear-gradient(135deg, var(--blue-d), var(--blue));
            color: #fff;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-blue:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.4);
        }

        .btn-blue:active {
            transform: translateY(0);
        }

        .btn-blue:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-green {
            background: linear-gradient(135deg, var(--green-d), var(--green));
            color: #fff;
            box-shadow: 0 4px 16px rgba(5, 150, 105, 0.3);
        }

        .btn-sm {
            width: auto;
            padding: 8px 16px;
            font-size: 0.78rem;
            border-radius: 8px;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg3);
            padding: 4px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 9px 6px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .tab.active {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 2px 10px rgba(79, 142, 247, 0.3);
        }

        .tab:not(.active):hover {
            background: rgba(79, 142, 247, 0.08);
            color: var(--text);
        }

        /* ── Status Bars ── */
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 14px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .status-ok {
            background: rgba(16, 217, 160, 0.08);
            border: 1px solid rgba(16, 217, 160, 0.18);
            color: var(--green);
        }

        .status-warn {
            background: rgba(245, 166, 35, 0.08);
            border: 1px solid rgba(245, 166, 35, 0.18);
            color: var(--amber);
        }

        .status-err {
            background: rgba(247, 93, 93, 0.08);
            border: 1px solid rgba(247, 93, 93, 0.18);
            color: var(--red);
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-green {
            background: var(--green);
            animation: blink 2s infinite;
        }

        .dot-amber {
            background: var(--amber);
            animation: blink 1s infinite;
        }

        .dot-red {
            background: var(--red);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        .status-actions {
            margin-right: auto;
            display: flex;
            gap: 6px;
        }

        /* ── Suggestion List ── */
        .suggest-list {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 280px;
            overflow-y: auto;
            margin-top: -8px;
            margin-bottom: 14px;
        }

        .suggest-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            cursor: pointer;
            border-bottom: 1px solid rgba(30, 45, 69, 0.5);
            transition: background 0.15s;
            gap: 8px;
        }

        .suggest-item:last-child {
            border-bottom: none;
        }

        .suggest-item:hover,
        .suggest-item:active {
            background: rgba(79, 142, 247, 0.08);
        }

        .suggest-item .name {
            font-weight: 600;
            font-size: 0.88rem;
        }

        .suggest-item .meta {
            font-size: 0.72rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            direction: ltr;
            text-align: left;
        }

        .suggest-hint {
            padding: 14px;
            text-align: center;
            color: var(--muted);
            font-size: 0.78rem;
        }

        /* ── Result Cards ── */
        .result {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            margin-bottom: 14px;
            overflow: hidden;
            animation: slide-up 0.35s ease forwards;
            opacity: 0;
            transition: border-color 0.25s, box-shadow 0.2s;
        }

        .result:hover {
            border-color: rgba(79, 142, 247, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
        }

        .result-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 700;
        }

        .badge-green {
            background: rgba(16, 217, 160, 0.12);
            color: var(--green);
            border: 1px solid rgba(16, 217, 160, 0.25);
        }

        .badge-red {
            background: rgba(247, 93, 93, 0.12);
            color: var(--red);
            border: 1px solid rgba(247, 93, 93, 0.25);
        }

        .badge-amber {
            background: rgba(245, 166, 35, 0.12);
            color: var(--amber);
            border: 1px solid rgba(245, 166, 35, 0.25);
        }

        .badge-blue {
            background: rgba(79, 142, 247, 0.12);
            color: var(--blue);
            border: 1px solid rgba(79, 142, 247, 0.25);
        }

        .badge-cyan {
            background: rgba(34, 211, 238, 0.12);
            color: var(--cyan);
            border: 1px solid rgba(34, 211, 238, 0.25);
        }

        /* ── Result Sections ── */
        .result-section {
            padding: 14px 18px;
        }

        .result-section+.result-section {
            border-top: 1px solid var(--border);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--blue);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .section-title .sec-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .sec-blue {
            background: rgba(79, 142, 247, 0.12);
        }

        .sec-green {
            background: rgba(16, 217, 160, 0.12);
        }

        .sec-amber {
            background: rgba(245, 166, 35, 0.12);
        }

        .sec-cyan {
            background: rgba(34, 211, 238, 0.12);
        }

        .sec-purple {
            background: rgba(167, 139, 250, 0.12);
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .result-grid .field {
            display: flex;
            flex-direction: column;
            gap: 3px;
            background: var(--bg3);
            border-radius: 8px;
            padding: 9px 12px;
        }

        .result-grid .field.full {
            grid-column: 1 / -1;
        }

        .field-label {
            font-size: 0.62rem;
            color: var(--muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .field-value {
            font-size: 0.82rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            direction: ltr;
            text-align: right;
            word-break: break-all;
        }

        .field-value.rtl {
            font-family: inherit;
            direction: rtl;
            word-break: normal;
        }

        /* ── Signal Quality ── */
        .signal-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 3px;
        }

        .signal-bar .bar {
            flex: 1;
            height: 4px;
            background: var(--bg4);
            border-radius: 2px;
            overflow: hidden;
        }

        .signal-bar .bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s;
        }

        .signal-good {
            background: var(--green);
        }

        .signal-ok {
            background: var(--amber);
        }

        .signal-bad {
            background: var(--red);
        }

        /* ── Detail loading ── */
        .detail-loading {
            padding: 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .spinner-blue {
            border-color: rgba(79, 142, 247, 0.2);
            border-top-color: var(--blue);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .loading-center .spinner {
            width: 26px;
            height: 26px;
        }

        /* ── Empty ── */
        .empty {
            text-align: center;
            padding: 40px 16px;
            color: var(--muted);
        }

        .empty .emoji {
            font-size: 2.5rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* ── Toast ── */
        .toast-wrap {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9000;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--bg2);
            border-radius: var(--radius-sm);
            padding: 11px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: toast-in 0.25s ease;
        }

        .toast-ok {
            border: 1px solid rgba(16, 217, 160, 0.35);
        }

        .toast-err {
            border: 1px solid rgba(247, 93, 93, 0.35);
        }

        @keyframes toast-in {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Welcome Badge ── */
        .welcome-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 14px 6px 8px;
            font-size: 0.78rem;
            margin-bottom: 14px;
        }

        .welcome-badge .avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue-d), var(--blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #fff;
            font-weight: 700;
        }

        /* ── Results Count ── */
        .results-count {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 12px;
            padding: 0 2px;
        }

        .results-count span {
            color: var(--blue);
            font-weight: 700;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .app {
                padding: 10px 10px env(safe-area-inset-bottom, 20px);
            }

            .header {
                padding: 18px 0 14px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .card {
                padding: 18px 14px;
            }

            .result-section {
                padding: 12px 14px;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }

            .tab {
                font-size: 0.72rem;
                padding: 8px 4px;
            }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--muted);
            border-radius: 3px;
        }

        /* ── Visibility ── */
        .hidden {
            display: none !important;
        }

        /* ── Page Transition ── */
        .fade-in {
            animation: fade-in 0.3s ease;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Remember Me Toggle ── */
        .remember-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .remember-row span {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .toggle-wrap {
            position: relative;
            width: 42px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle-wrap input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: var(--bg4);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }

        .toggle-wrap input:checked+.toggle-track {
            background: var(--blue);
        }

        .toggle-wrap input:checked+.toggle-track::after {
            transform: translateX(18px);
        }

        /* ── Smart Diagnostic Tips ── */
        .diag-tips {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
        }

        .diag-title {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--purple);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .diag-tip {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .diag-tip:last-child {
            margin-bottom: 0;
        }

        .diag-ok {
            background: rgba(16, 217, 160, 0.08);
            color: var(--green);
            border: 1px solid rgba(16, 217, 160, 0.15);
        }

        .diag-warn {
            background: rgba(245, 166, 35, 0.08);
            color: var(--amber);
            border: 1px solid rgba(245, 166, 35, 0.15);
        }

        .diag-err {
            background: rgba(247, 93, 93, 0.08);
            color: var(--red);
            border: 1px solid rgba(247, 93, 93, 0.15);
        }

        /* ── Copy Feedback ── */
        .field-value {
            cursor: pointer;
            position: relative;
            transition: color 0.15s;
        }

        .field-value:hover {
            color: var(--blue);
        }

        .field-value.copied {
            color: var(--green) !important;
        }

        .field-value.copied::after {
            content: ' ✓';
        }

        /* ── Search History ── */
        .history-box {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 14px;
        }

        .history-title {
            padding: 10px 14px 6px;
            font-size: 0.7rem;
            color: var(--muted);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-clear {
            background: none;
            border: none;
            color: var(--red);
            font-size: 0.68rem;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: inherit;
        }

        .history-clear:hover {
            background: rgba(247, 93, 93, 0.1);
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 14px;
            cursor: pointer;
            border-top: 1px solid rgba(30, 45, 69, 0.4);
            transition: background 0.15s;
            gap: 8px;
            min-height: 44px;
        }

        .history-item:hover {
            background: rgba(79, 142, 247, 0.08);
        }

        .history-item .h-query {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .history-item .h-name {
            font-size: 0.72rem;
            color: var(--muted);
        }

        .history-item .h-time {
            font-size: 0.65rem;
            color: var(--muted);
            white-space: nowrap;
        }

        /* ── FAB Search Button ── */
        .fab {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-d), var(--green));
            color: #fff;
            border: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(16, 217, 160, 0.35);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .fab.visible {
            transform: translateX(-50%) scale(1);
        }

        .fab:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* ── Auto-refresh Badge ── */
        .refresh-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .refresh-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            color: var(--muted);
            padding: 3px 8px;
            background: var(--bg4);
            border-radius: 10px;
        }

        .refresh-badge.active {
            color: var(--green);
        }

        .refresh-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .refresh-pulse {
            animation: r-pulse 0.6s ease;
        }

        @keyframes r-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ── Glassmorphism (subtle) ── */
        .card-glass {
            background: rgba(13, 18, 32, 0.55) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        @supports not (backdrop-filter: blur(1px)) {
            .card-glass {
                background: var(--bg2) !important;
            }
        }

        /* ── Mobile Touch ── */
        @media (max-width: 480px) {

            .btn,
            .tab,
            .suggest-item,
            .history-item {
                min-height: 44px;
            }

            .fab {
                bottom: 24px;
                width: 50px;
                height: 50px;
            }

            input[type="text"],
            input[type="password"] {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app">
        <!-- ── Header ── -->
        <header class="header">
            <div class="header-logo">🌐</div>
            <h1>FTTH بحث المشتركين</h1>
            <p>أداة البحث للفنيين</p>
        </header>

        <!-- ══════════════════════════════════════════════ -->
        <!-- LOGIN SECTION -->
        <!-- ══════════════════════════════════════════════ -->
        <section id="loginSection" class="fade-in">
            <div class="card card-glow-blue card-glass">
                <div class="card-title">
                    <div class="icon icon-blue">🔐</div>
                    تسجيل الدخول
                </div>

                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <div class="input-wrap">
                        <span class="ico">👤</span>
                        <input type="text" id="loginUser" placeholder="اسم المستخدم" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrap">
                        <span class="ico">🔑</span>
                        <input type="password" id="loginPass" placeholder="كلمة المرور" autocomplete="current-password">
                        <button class="pw-toggle" id="togglePass" type="button">👁</button>
                    </div>
                </div>

                <div class="remember-row">
                    <label class="toggle-wrap">
                        <input type="checkbox" id="rememberMe">
                        <div class="toggle-track"></div>
                    </label>
                    <span>تذكرني</span>
                </div>

                <div id="loginError" class="hidden"
                    style="color:var(--red);font-size:0.78rem;padding:8px 12px;background:rgba(247,93,93,0.08);border-radius:8px;margin-bottom:12px;font-weight:600;">
                </div>

                <button class="btn btn-blue" id="loginBtn" onclick="doLogin()">
                    دخول ←
                </button>
            </div>
        </section>

        <!-- ══════════════════════════════════════════════ -->
        <!-- CONNECTING SECTION -->
        <!-- ══════════════════════════════════════════════ -->
        <section id="connectingSection" class="hidden">
            <div class="card">
                <div class="loading-center" style="padding:50px 20px;">
                    <div class="spinner spinner-blue" style="width:30px;height:30px;"></div>
                    <span>جاري الاتصال بنظام FTTH...</span>
                </div>
            </div>
        </section>

        <!-- ══════════════════════════════════════════════ -->
        <!-- SEARCH SECTION -->
        <!-- ══════════════════════════════════════════════ -->
        <section id="searchSection" class="hidden fade-in">
            <!-- Welcome + Status -->
            <div class="welcome-badge" id="welcomeBadge">
                <div class="avatar" id="avatarLetter"></div>
                <span id="welcomeName"></span>
            </div>

            <div class="status status-ok" id="statusBar">
                <div class="dot dot-green"></div>
                <span>متصل بالنظام — جاهز للبحث</span>
                <div class="status-actions">
                    <button class="btn btn-sm"
                        style="background:rgba(247,93,93,0.12);color:var(--red);border:1px solid rgba(247,93,93,0.25);"
                        onclick="doLogout()">خروج</button>
                </div>
            </div>

            <!-- Search Card -->
            <div class="card card-glow-green card-glass">
                <div class="card-title">
                    <div class="icon icon-green">🔍</div>
                    بحث عن مشترك
                </div>

                <!-- Smart Search (auto-detects type) -->
                <div class="form-group">
                    <label id="searchLabel">ابحث بالاسم، اليوزر، أو الرقم</label>
                    <div class="input-wrap">
                        <span class="ico" id="searchIcon">🔍</span>
                        <input type="text" id="searchInput" placeholder="اكتب اسم، يوزر، أو رقم..." autocomplete="off"
                            oninput="onSearchInput()" onkeydown="onSearchKey(event)" onfocus="onSearchFocus()"
                            onblur="setTimeout(()=>hideHistory(),200)">
                    </div>
                    <div id="searchHint"
                        style="display:flex;align-items:center;gap:5px;margin-top:6px;font-size:0.7rem;color:var(--muted);min-height:18px;">
                    </div>
                </div>

                <button class="btn btn-green" id="searchBtn" onclick="doSearch()">
                    🔍 بحث
                </button>
            </div>

            <!-- Suggestion List -->
            <div id="suggestBox" class="hidden"></div>

            <!-- Search History -->
            <div id="historyBox" class="hidden"></div>

            <!-- Results -->
            <div id="resultsContainer"></div>
        </section>
    </div>

    <!-- FAB Search Button -->
    <button class="fab" id="fabSearch" onclick="scrollToSearch()">🔍</button>

    <!-- Toast -->
    <div class="toast-wrap" id="toastWrap"></div>

    <script>
        // ════════════════════════════════════════════════
        //  CONFIG
        // ════════════════════════════════════════════════
        const FTTH_URL = 'https://admin.ftth.iq';
        const FTTH_USER = 'link1';
        const FTTH_PASS = 'ALI931990ali';

        // ── Proxy Config ──
        // Set your own proxy URL after deploying proxy/server.js
        const PROXY_URL = ''; // e.g. 'https://your-ftth-proxy.onrender.com'
        const FALLBACK_PROXIES = [
            'https://corsproxy.io/?url=',
            'https://thingproxy.freeboard.io/fetch/',
            'https://api.allorigins.win/raw?url=',
        ];
        let _proxyMode = -1; // cached working proxy index

        // SpaceLink Supabase (technician auth)
        const SB_URL = 'https://icpqrnzvxjexdzwfkcjm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljcHFybnp2eGpleGR6d2ZrY2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDE2ODksImV4cCI6MjA4OTQxNzY4OX0.mvnD_Cr1EbBtMLiD0VwhdxXAo8bSDTRxRyF2Squ0aE8';
        const SB_HDR = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

        // ════════════════════════════════════════════════
        //  NETWORK LAYER (CORS Proxy + Fallback)
        // ════════════════════════════════════════════════
        const isLocal = location.protocol === 'file:';

        function _buildStrategies(url) {
            const s = [];
            if (PROXY_URL) { const u = new URL(url); s.push(PROXY_URL + u.pathname + u.search); }
            FALLBACK_PROXIES.forEach(p => s.push(p + encodeURIComponent(url)));
            s.push(url); // direct as last resort
            return s;
        }

        async function proxyFetch(url, opts = {}) {
            const strategies = _buildStrategies(url);
            // Try cached working proxy first
            if (_proxyMode >= 0 && _proxyMode < strategies.length) {
                try {
                    const r = await fetch(strategies[_proxyMode], opts);
                    if (r.ok || r.status === 401) return r;
                } catch { _proxyMode = -1; }
            }
            // Try each strategy
            for (let i = 0; i < strategies.length; i++) {
                try {
                    console.log(`[FTTH] Trying proxy ${i}: ${strategies[i].substring(0, 60)}...`);
                    const r = await fetch(strategies[i], opts);
                    console.log(`[FTTH] Proxy ${i} responded: ${r.status}`);
                    if (r.ok || r.status === 401 || r.status === 400) { _proxyMode = i; return r; }
                } catch (e) {
                    console.warn(`[FTTH] Proxy ${i} failed:`, e.message);
                }
            }
            throw new Error('جميع طرق الاتصال فشلت');
        }

        // ════════════════════════════════════════════════
        //  STATE
        // ════════════════════════════════════════════════
        let ftthToken = null;
        let searchType = 'username';
        let currentUser = null;
        let searchTimer = null;
        let autoRefreshTimer = null;
        let autoRefreshSubs = [];

        // ════════════════════════════════════════════════
        //  HASH (same as SpaceLink DJB2)
        // ════════════════════════════════════════════════
        function hashPw(pw) {
            let h = 5381;
            for (let i = 0; i < pw.length; i++) h = ((h << 5) + h) ^ pw.charCodeAt(i);
            return (h >>> 0).toString(16).padStart(8, '0');
        }

        // ════════════════════════════════════════════════
        //  SUPABASE QUERY
        // ════════════════════════════════════════════════
        async function sbQuery(table, filter) {
            const url = `${SB_URL}/rest/v1/${table}${filter ? '?' + filter : ''}`;
            const res = await fetch(url, { headers: SB_HDR });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        // ════════════════════════════════════════════════
        //  TOAST
        // ════════════════════════════════════════════════
        function toast(msg, type = 'ok') {
            const wrap = document.getElementById('toastWrap');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            const icons = { ok: '✅', err: '❌' };
            el.innerHTML = `<span>${icons[type] || '✅'}</span><span>${msg}</span>`;
            wrap.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0'; el.style.transform = 'translateY(-14px)'; el.style.transition = 'all 0.25s';
                setTimeout(() => el.remove(), 250);
            }, 3200);
        }

        // ════════════════════════════════════════════════
        //  UTILITIES
        // ════════════════════════════════════════════════
        function vibrate(ms = 30) { try { navigator.vibrate?.(ms); } catch { } }

        function copyToClipboard(text) {
            if (!text || text === '—') return;
            if (navigator.clipboard) navigator.clipboard.writeText(text);
            else { const t = document.createElement('textarea'); t.value = text; t.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove(); }
            vibrate();
            toast('تم النسخ 📋');
        }

        // Click any field-value to copy
        document.addEventListener('click', e => {
            const fv = e.target.closest('.field-value');
            if (fv && fv.textContent.trim() !== '—') {
                copyToClipboard(fv.textContent.trim());
                fv.classList.add('copied');
                setTimeout(() => fv.classList.remove('copied'), 1200);
            }
        });

        // Vibration on buttons
        document.addEventListener('click', e => {
            if (e.target.closest('.btn, .tab, .fab')) vibrate();
        });

        // ════════════════════════════════════════════════
        //  SEARCH HISTORY
        // ════════════════════════════════════════════════
        function saveHistory(query, resultName) {
            let h = JSON.parse(localStorage.getItem('ftth_history') || '[]');
            h = h.filter(x => x.q !== query);
            h.unshift({ q: query, name: resultName || '', ts: Date.now() });
            if (h.length > 20) h = h.slice(0, 20);
            localStorage.setItem('ftth_history', JSON.stringify(h));
        }

        function getTimeAgo(ts) {
            const m = Math.floor((Date.now() - ts) / 60000);
            if (m < 1) return 'الآن';
            if (m < 60) return `قبل ${m} دقيقة`;
            const hr = Math.floor(m / 60);
            if (hr < 24) return `قبل ${hr} ساعة`;
            return `قبل ${Math.floor(hr / 24)} يوم`;
        }

        function onSearchFocus() {
            const q = document.getElementById('searchInput').value.trim();
            if (q.length > 0) return;
            showHistory();
        }

        function showHistory() {
            const h = JSON.parse(localStorage.getItem('ftth_history') || '[]');
            const box = document.getElementById('historyBox');
            if (h.length === 0) { box.classList.add('hidden'); return; }
            let html = '<div class="history-box"><div class="history-title"><span>📜 عمليات بحث سابقة</span><button class="history-clear" onclick="clearHistory()">مسح</button></div>';
            h.forEach(item => {
                html += `<div class="history-item" onclick="useHistory('${item.q.replace(/'/g, "\\'")}')"><div><div class="h-query">${item.q}</div>${item.name ? `<div class="h-name">${item.name}</div>` : ''}</div><div class="h-time">${getTimeAgo(item.ts)}</div></div>`;
            });
            html += '</div>';
            box.innerHTML = html;
            box.classList.remove('hidden');
        }

        function hideHistory() { document.getElementById('historyBox').classList.add('hidden'); }

        function useHistory(q) {
            document.getElementById('searchInput').value = q;
            hideHistory();
            doSearch();
        }

        function clearHistory() {
            localStorage.removeItem('ftth_history');
            hideHistory();
            toast('تم مسح السجل');
        }

        // ════════════════════════════════════════════════
        //  FAB + SCROLL
        // ════════════════════════════════════════════════
        function scrollToSearch() {
            vibrate();
            document.getElementById('searchInput').scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => document.getElementById('searchInput').focus(), 400);
        }

        window.addEventListener('scroll', () => {
            const fab = document.getElementById('fabSearch');
            const show = window.scrollY > 300 && !document.getElementById('searchSection').classList.contains('hidden');
            fab.classList.toggle('visible', show);
        }, { passive: true });

        // ════════════════════════════════════════════════
        //  AUTO-REFRESH ONT STATUS
        // ════════════════════════════════════════════════
        function startAutoRefresh(subs) {
            stopAutoRefresh();
            autoRefreshSubs = subs.filter(s => s._detailed && (s.self?.id || s.id));
            if (autoRefreshSubs.length === 0) return;
            autoRefreshTimer = setInterval(doAutoRefresh, 10000);
            // Show badge
            document.querySelectorAll('.refresh-badge').forEach(b => b.classList.add('active'));
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
            autoRefreshSubs = [];
        }

        async function doAutoRefresh() {
            for (const sub of autoRefreshSubs) {
                const subId = sub.self?.id || sub.id;
                if (!subId) continue;
                try {
                    const ont = await ftthGet(`/api/subscriptions/${subId}/ont-status`);
                    if (!ont) continue;
                    const m = ont.model || ont;
                    sub.ontStatus = m.status?.displayValue || m.status;
                    sub.rxPower = m.rxPower;
                    // Update DOM
                    const card = document.querySelector(`[data-sub-id="${subId}"]`);
                    if (card) {
                        const ontBadge = card.querySelector('.ont-badge');
                        const rxVal = card.querySelector('.rx-val');
                        const ontSt = getOntStatus(sub);
                        const sig = getSignalInfo(sub);
                        if (ontBadge) { ontBadge.className = `badge ont-badge ${ontSt.cls}`; ontBadge.textContent = ontSt.label; }
                        if (rxVal) { rxVal.textContent = sig.val; rxVal.style.color = sig.cls === 'signal-good' ? 'var(--green)' : sig.cls === 'signal-bad' ? 'var(--red)' : 'var(--amber)'; }
                        // Pulse animation
                        const section = card.querySelector('.tech-section');
                        if (section) { section.classList.add('refresh-pulse'); setTimeout(() => section.classList.remove('refresh-pulse'), 600); }
                        // Update time
                        const timeEl = card.querySelector('.refresh-time');
                        if (timeEl) timeEl.textContent = new Date().toLocaleTimeString('ar-IQ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    }
                } catch { }
            }
        }

        // ════════════════════════════════════════════════
        //  PASSWORD TOGGLE
        // ════════════════════════════════════════════════
        document.getElementById('togglePass').addEventListener('click', function () {
            const inp = document.getElementById('loginPass');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            this.textContent = inp.type === 'password' ? '👁' : '🙈';
        });

        // ════════════════════════════════════════════════
        //  TECHNICIAN LOGIN (via SpaceLink Supabase)
        // ════════════════════════════════════════════════
        async function doLogin() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            const btn = document.getElementById('loginBtn');
            const errDiv = document.getElementById('loginError');

            errDiv.classList.add('hidden');

            if (!u || !p) { errDiv.textContent = '❌ أدخل اسم المستخدم وكلمة المرور'; errDiv.classList.remove('hidden'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري التحقق...';

            try {
                // Query tech_users from Supabase
                const users = await sbQuery('tech_users', `username=eq.${encodeURIComponent(u)}`);
                const techUser = users.find(x => x.username === u && x.password_hash === hashPw(p));

                if (!techUser) {
                    errDiv.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
                    errDiv.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = 'دخول ←';
                    return;
                }

                // Get technician name
                let techName = u;
                try {
                    const techs = await sbQuery('technicians', `id=eq.${techUser.tech_id}`);
                    if (techs.length > 0) techName = techs[0].name;
                } catch { }

                currentUser = { username: u, techId: techUser.tech_id, name: techName };

                // Save session if remember me is checked
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('ftth_session', JSON.stringify({
                        username: currentUser.username,
                        techId: currentUser.techId,
                        name: currentUser.name,
                        ts: Date.now()
                    }));
                }

                // Now connect to FTTH
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('connectingSection').classList.remove('hidden');

                const connected = await connectFTTH();

                document.getElementById('connectingSection').classList.add('hidden');

                if (connected) {
                    showSearchView();
                    toast(`مرحباً ${techName} 👋`);
                } else {
                    document.getElementById('loginSection').classList.remove('hidden');
                    if (isLocal) {
                        errDiv.innerHTML = '⚠️ لا يمكن الاتصال من الملف المحلي.<br>افتح الأداة من الرابط:<br><a href="https://abood141.github.io/ftth-search/" style="color:var(--blue);text-decoration:underline;font-weight:700;" target="_blank">abood141.github.io/ftth-search</a>';
                    } else {
                        errDiv.textContent = '⚠️ تعذر الاتصال بنظام FTTH — حاول مرة أخرى';
                    }
                    errDiv.classList.remove('hidden');
                }

            } catch (err) {
                errDiv.textContent = 'خطأ في الاتصال: ' + err.message;
                errDiv.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.innerHTML = 'دخول ←';
        }

        // Enter to login
        document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });

        // ════════════════════════════════════════════════
        //  FTTH CONNECTION
        // ════════════════════════════════════════════════
        async function connectFTTH() {
            try {
                const form = new URLSearchParams();
                form.append('grant_type', 'password');
                form.append('scope', 'openid profile');
                form.append('client_id', '');
                form.append('username', FTTH_USER);
                form.append('password', FTTH_PASS);

                const res = await proxyFetch(`${FTTH_URL}/api/auth/Contractor/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Accept': 'application/json, text/plain, */*',
                    },
                    body: form
                });

                const data = await res.json();
                if (data.access_token) { ftthToken = data.access_token; return true; }
            } catch { }
            return false;
        }

        async function reconnectFTTH() {
            const bar = document.getElementById('statusBar');
            bar.className = 'status status-warn';
            bar.querySelector('span:not(.dot)') && (bar.children[1].textContent = 'جاري إعادة الاتصال...');
            bar.children[0].className = 'dot dot-amber';

            const ok = await connectFTTH();

            if (ok) {
                bar.className = 'status status-ok';
                bar.children[0].className = 'dot dot-green';
                bar.children[1].textContent = 'متصل بالنظام — جاهز للبحث';
                toast('تم إعادة الاتصال');
            } else {
                bar.className = 'status status-err';
                bar.children[0].className = 'dot dot-red';
                bar.children[1].textContent = 'غير متصل — اضغط إعادة المحاولة';
            }
            return ok;
        }

        // ════════════════════════════════════════════════
        //  SHOW / HIDE VIEWS
        // ════════════════════════════════════════════════
        function showSearchView() {
            document.getElementById('searchSection').classList.remove('hidden');

            // Set welcome info
            const name = currentUser?.name || currentUser?.username || '';
            document.getElementById('welcomeName').textContent = `مرحباً، ${name}`;
            document.getElementById('avatarLetter').textContent = name.charAt(0);

            document.getElementById('searchInput').focus();
        }

        function doLogout() {
            ftthToken = null;
            currentUser = null;
            localStorage.removeItem('ftth_session');
            document.getElementById('searchSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('loginPass').value = '';
            document.getElementById('resultsContainer').innerHTML = '';
            document.getElementById('suggestBox').classList.add('hidden');
            toast('تم تسجيل الخروج');
        }

        // ════════════════════════════════════════════════
        //  SMART TYPE DETECTION
        // ════════════════════════════════════════════════
        function detectSearchType(q) {
            if (!q) return 'name';
            const hasArabic = /[\u0600-\u06FF]/.test(q);
            const hasLatin = /[a-zA-Z]/.test(q);
            const isAllDigits = /^[\d+ ()-]+$/.test(q);

            if (isAllDigits && q.replace(/\D/g, '').length >= 4) return 'number';
            if (hasArabic) return 'name';
            if (hasLatin) return 'username';
            return 'name';
        }

        function getTypeLabel(type) {
            const labels = {
                username: '🧑‍💻 يبحث باليوزر',
                name: '📝 يبحث بالاسم',
                number: '📞 يبحث بالرقم'
            };
            return labels[type] || '';
        }

        // ════════════════════════════════════════════════
        //  PARTIAL SEARCH (live suggestions)
        // ════════════════════════════════════════════════
        function onSearchInput() {
            clearTimeout(searchTimer);
            const q = document.getElementById('searchInput').value.trim();
            const hint = document.getElementById('searchHint');

            if (q.length < 1) {
                hint.innerHTML = '';
                document.getElementById('suggestBox').classList.add('hidden');
                return;
            }

            // Show detected type hint
            const detected = detectSearchType(q);
            searchType = detected;
            hint.innerHTML = `<span style="color:var(--blue);font-weight:600;">${getTypeLabel(detected)}</span>`;

            if (q.length < 2) {
                document.getElementById('suggestBox').classList.add('hidden');
                return;
            }

            // Debounce: wait 500ms after typing stops
            searchTimer = setTimeout(() => fetchSuggestions(q), 500);
        }

        function onSearchKey(e) {
            if (e.key === 'Enter') {
                clearTimeout(searchTimer);
                document.getElementById('suggestBox').classList.add('hidden');
                doSearch();
            }
        }

        async function fetchSuggestions(q) {
            if (!ftthToken) return;

            const box = document.getElementById('suggestBox');
            box.classList.remove('hidden');
            box.innerHTML = '<div class="suggest-hint"><span class="spinner spinner-blue" style="width:16px;height:16px;"></span> جاري البحث...</div>';

            try {
                const items = await ftthSearch(q);

                if (!items || items.length === 0) {
                    box.innerHTML = '<div class="suggest-hint">لا توجد نتائج</div>';
                    return;
                }

                let html = '<div class="suggest-list">';
                items.forEach((sub, i) => {
                    const name = sub.customer?.displayValue || sub.name || sub.subscriberName || sub.fullName || '—';
                    const uname = sub.username || sub.userName || '';
                    html += `<div class="suggest-item" onclick="selectSuggestion(${i})" data-index="${i}">
                        <div class="name">${name}</div>
                        <div class="meta">${uname}</div>
                    </div>`;
                });
                html += '</div>';
                box.innerHTML = html;

                // Store items for selection
                box._items = items;

            } catch (err) {
                box.innerHTML = '<div class="suggest-hint" style="color:var(--red);">خطأ في البحث</div>';
            }
        }

        async function selectSuggestion(index) {
            const box = document.getElementById('suggestBox');
            const items = box._items;
            if (!items || !items[index]) return;

            box.classList.add('hidden');
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `<div class="loading-center"><div class="spinner spinner-blue"></div><span>جاري تحميل التفاصيل...</span></div>`;

            const detailed = await fetchSubscriberDetail(items[index]);
            renderResults([detailed], '');
        }

        // ════════════════════════════════════════════════
        //  FTTH API HELPERS
        // ════════════════════════════════════════════════
        async function ftthGet(path) {
            const url = `${FTTH_URL}${path}`;
            const res = await proxyFetch(url, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${ftthToken}`,
                    'Accept': 'application/json, text/plain, */*',
                }
            });
            if (res.status === 401) {
                const ok = await reconnectFTTH();
                if (!ok) throw new Error('Session expired');
                return ftthGet(path);
            }
            if (!res.ok) return null;
            return res.json();
        }

        async function ftthSearch(query) {
            const type = detectSearchType(query);
            searchType = type;

            const baseParams = () => {
                const p = new URLSearchParams();
                p.append('pageSize', '20');
                p.append('pageNumber', '1');
                p.append('sortCriteria.property', 'expires');
                p.append('sortCriteria.direction', 'asc');
                p.append('hierarchyLevel', '0');
                return p;
            };

            // Primary search based on detected type
            const params = baseParams();
            switch (type) {
                case 'username': params.append('username', query); break;
                case 'name': params.append('name', query); break;
                case 'number': params.append('phone', query); break;
            }

            let results = await fetchResults(params);

            // If no results with primary type, try other types too
            if (results.length === 0) {
                const fallbackTypes = ['name', 'username', 'number'].filter(t => t !== type);
                for (const fbType of fallbackTypes) {
                    const fbParams = baseParams();
                    switch (fbType) {
                        case 'username': fbParams.append('username', query); break;
                        case 'name': fbParams.append('name', query); break;
                        case 'number': fbParams.append('phone', query); break;
                    }
                    const fbResults = await fetchResults(fbParams);
                    if (fbResults.length > 0) {
                        // Update hint to show what actually worked
                        const hint = document.getElementById('searchHint');
                        if (hint) hint.innerHTML = `<span style="color:var(--green);font-weight:600;">${getTypeLabel(fbType)} ✓</span>`;
                        return fbResults;
                    }
                }
            }

            return results;
        }

        async function fetchResults(params) {
            const data = await ftthGet(`/api/subscriptions?${params.toString()}`);
            if (!data) return [];
            if (Array.isArray(data)) return data;
            if (data.items) return data.items;
            if (data.data) return data.data;
            if (data.username || data.name) return [data];
            return [];
        }

        // Fetch full subscriber details from multiple endpoints
        async function fetchSubscriberDetail(sub) {
            const subId = sub.self?.id || sub.id || sub.subscriptionId;
            const custId = sub.customer?.id || sub.customerId;
            if (!subId) return sub;

            const enriched = { ...sub, _detailed: true };

            // 1. Subscription detail → customerName, macAddress, ipAddress, devicePassword, ontSerial, fdt, fat, ontVendor
            try {
                const detail = await ftthGet(`/api/subscriptions/${subId}`);
                if (detail) {
                    const m = detail.model || detail;
                    enriched.customerName = m.customerName;
                    enriched.username = m.username || enriched.username;
                    enriched.macAddress = m.macAddress;
                    enriched.ipAddress = m.ipAddress;
                    enriched.devicePassword = m.devicePassword;
                    enriched.ontSerial = m.ontSerial;
                    enriched.ontVendor = m.ontVendor?.displayValue || m.ontVendor;
                    enriched.fdtDetail = m.fdt?.displayValue || m.fdt;
                    enriched.fatDetail = m.fat?.displayValue || m.fat;
                    enriched.partner = m.partner?.displayValue || m.partner;
                    enriched.planDetail = m.displayValue || m.planName;
                    enriched.detailId = m.id;
                }
            } catch { }

            // 2. Customer detail → phone, address
            if (custId) {
                try {
                    const cust = await ftthGet(`/api/customers/${custId}`);
                    if (cust) {
                        const m = cust.model || cust;
                        enriched.phone = m.primaryContact?.mobile || m.phone;
                        enriched.address = m.addresses?.[0]?.displayValue;
                        enriched.email = m.primaryContact?.email;
                    }
                } catch { }
            }

            // 3. ONT status → Up/Down, rxPower
            try {
                const ont = await ftthGet(`/api/subscriptions/${subId}/ont-status`);
                if (ont) {
                    const m = ont.model || ont;
                    enriched.ontStatus = m.status?.displayValue || m.status;
                    enriched.rxPower = m.rxPower;
                }
            } catch { }

            return enriched;
        }

        // ════════════════════════════════════════════════
        //  FULL SEARCH (button click)
        // ════════════════════════════════════════════════
        async function doSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const btn = document.getElementById('searchBtn');
            const container = document.getElementById('resultsContainer');

            if (!query) { toast('ادخل قيمة البحث', 'err'); return; }

            if (!ftthToken) {
                toast('جاري إعادة الاتصال...', 'err');
                const ok = await reconnectFTTH();
                if (!ok) return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري البحث...';
            document.getElementById('suggestBox').classList.add('hidden');
            container.innerHTML = `<div class="loading-center"><div class="spinner spinner-blue"></div><span>جاري البحث عن "${query}"...</span></div>`;

            try {
                const items = await ftthSearch(query);
                renderResults(items, query);

                // Fetch detailed info for each result
                if (items && items.length > 0 && items.length <= 5) {
                    for (let i = 0; i < items.length; i++) {
                        const detailed = await fetchSubscriberDetail(items[i]);
                        items[i] = detailed;
                    }
                    renderResults(items, query);
                    startAutoRefresh(items);
                }

                // Save to history
                if (items && items.length > 0) {
                    const firstName = items[0].customerName || items[0].customer?.displayValue || '';
                    saveHistory(query, firstName);
                }
            } catch (err) {
                container.innerHTML = '';
                toast('خطأ في البحث: ' + err.message, 'err');
            }

            btn.disabled = false;
            btn.innerHTML = '🔍 بحث';
        }

        // ════════════════════════════════════════════════
        //  DATA EXTRACTION HELPERS
        // ════════════════════════════════════════════════
        function fmtDate(val) {
            if (!val) return '—';
            return String(val).replace('T', ' ').replace('Z', '').substring(0, 16);
        }

        function v(sub, ...keys) {
            for (const k of keys) {
                // Support nested paths like 'customer.displayValue'
                if (k.includes('.')) {
                    const parts = k.split('.');
                    let val = sub;
                    for (const p of parts) {
                        if (val && typeof val === 'object') val = val[p];
                        else { val = undefined; break; }
                    }
                    if (val !== undefined && val !== null && val !== '') return val;
                } else {
                    // Also check if key is a nested object with displayValue
                    if (sub[k] !== undefined && sub[k] !== null && sub[k] !== '') {
                        if (typeof sub[k] === 'object' && sub[k].displayValue) return sub[k].displayValue;
                        return sub[k];
                    }
                }
            }
            return '—';
        }

        function getStatus(sub) {
            // Check status from ONT status endpoint
            if (sub.ontStatus) {
                const s = String(sub.ontStatus).toLowerCase();
                if (s === 'up' || s === 'online') return { label: 'متصل ✓', cls: 'badge-green' };
                if (s === 'down' || s === 'offline') return { label: 'غير متصل', cls: 'badge-red' };
            }
            // Check status field directly (API returns "Active", "Expired")
            if (sub.status) {
                const s = typeof sub.status === 'string' ? sub.status.toLowerCase() : '';
                if (s === 'expired' || s === 'منتهي') return { label: 'منتهي', cls: 'badge-red' };
                if (s === 'active' || s === 'فعال') return { label: 'فعال', cls: 'badge-green' };
                if (s) return { label: sub.status, cls: 'badge-amber' };
            }
            if (!sub.expires) return { label: 'غير معروف', cls: 'badge-amber' };
            const exp = new Date(sub.expires);
            if (exp < new Date()) return { label: 'منتهي', cls: 'badge-red' };
            return { label: 'فعال', cls: 'badge-green' };
        }

        function getOntStatus(sub) {
            const s = sub.ontStatus;
            if (!s) return { label: '—', cls: 'badge-amber' };
            const sl = String(s).toLowerCase();
            if (sl === 'up' || sl === 'online') return { label: 'متصل (Up)', cls: 'badge-green' };
            if (sl === 'down' || sl === 'offline') return { label: 'غير متصل (Down)', cls: 'badge-red' };
            return { label: s, cls: 'badge-amber' };
        }

        function getSignalInfo(sub) {
            const rx = sub.rxPower;
            if (rx === null || rx === undefined || rx === '') return { val: '—', pct: 0, cls: '' };
            const num = parseFloat(rx);
            if (isNaN(num)) return { val: rx, pct: 50, cls: 'signal-ok' };
            let pct, cls;
            if (num > -20) { pct = 90; cls = 'signal-good'; }
            else if (num > -25) { pct = 55; cls = 'signal-ok'; }
            else { pct = 25; cls = 'signal-bad'; }
            return { val: num.toFixed(2) + ' dBm', pct, cls };
        }

            });

            container.innerHTML = html;
        }

        // ════════════════════════════════════════════════
        //  SMART DIAGNOSTICS
        // ════════════════════════════════════════════════
        function getDiagnosticTips(sub) {
            const tips = [];
            const rx = parseFloat(sub.rxPower);
            if (!isNaN(rx)) {
                if (rx > -20) tips.push({ t: 'ok', m: '✅ إشارة ممتازة' });
                else if (rx > -25) tips.push({ t: 'warn', m: '⚠️ إشارة مقبولة — راقب الأداء' });
                else if (rx > -28) tips.push({ t: 'warn', m: '⚠️ إشارة ضعيفة — تحقق من الكيبل أو FAT' });
                else tips.push({ t: 'err', m: '❌ إشارة ضعيفة جداً — يجب فحص الخط بالكامل' });
            }
            if (sub.ontStatus) {
                const s = String(sub.ontStatus).toLowerCase();
                if (s === 'down' || s === 'offline')
                    tips.push({ t: 'err', m: '⚠️ الجهاز مطفي أو مفصول — تحقق من التيار والكيبل الضوئي' });
            }
            if (sub.expires) {
                const days = Math.ceil((new Date(sub.expires) - new Date()) / 86400000);
                if (days < 0) tips.push({ t: 'err', m: '📅 الاشتراك منتهي منذ ' + Math.abs(days) + ' يوم' });
                else if (days <= 3) tips.push({ t: 'warn', m: '📅 الاشتراك ينتهي خلال ' + days + ' يوم' });
            }
            return tips;
        }

        // ════════════════════════════════════════════════
        //  AUTO-LOGIN (Stay Logged In)
        // ════════════════════════════════════════════════
        (async function autoLogin() {
            const raw = localStorage.getItem('ftth_session');
            if (!raw) return;
            try {
                const s = JSON.parse(raw);
                // Expire after 7 days
                if (Date.now() - s.ts > 7 * 24 * 3600000) { localStorage.removeItem('ftth_session'); return; }
                currentUser = { username: s.username, techId: s.techId, name: s.name };
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('connectingSection').classList.remove('hidden');
                const ok = await connectFTTH();
                document.getElementById('connectingSection').classList.add('hidden');
                if (ok) {
                    showSearchView();
                    toast('مرحباً مجدداً ' + s.name + ' 👋');
                } else {
                    document.getElementById('loginSection').classList.remove('hidden');
                    localStorage.removeItem('ftth_session');
                }
            } catch { document.getElementById('loginSection').classList.remove('hidden'); }
        })();
    </script>
